<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Ex02: First form.</title>
  </head>
  <body>
    <h1>First form</h1>
    <form method="post">
      {% csrf_token %}
      {{ form }}
      <button type="submit">Submit</button>
    </form>

    <h2>History</h2>
    {% if history %}
      <ul>
        {% for entry in history %}
          <li>{{ entry.created|date:"Y-m-d H:i:s" }} : {{ entry.text }}</li>
        {% endfor %}
      </ul>
    {% else %}
      <p>No input yet.</p>
    {% endif %}
  </body>
</html>
